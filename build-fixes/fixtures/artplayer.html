<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,Chrome=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=9" />
    <meta name='robots' content='noindex, nofollow' />
    <title></title>
<style>
html,body{
    width:100%;
    height:100%;
    overflow: hidden;
}
* {
    margin: 0;
    padding: 0;
}
#container {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    width:100%;
    height:100%;
}
</style>
<script>
	const vid = "910d8f18ffe4e3389648f2a252c38786";
	const url = "https://example.com/test";
	const pic = "./loading.gif";
	const resumeKey = "910d8f18ffe4e3389648f2a252c38786:progress";
</script>
</head>
<body>
    <div id="container"></div>
	<script src="./js/hls.min.js"></script>
    <script src="./js/artplayer.js"></script>
    <script src="./js/artplayer-plugin-ads.js"></script>
    <!--
    <script src="./node_modules/artplayer/dist/artplayer.js"></script>
    <script src="./node_modules/artplayer-plugin-ads/dist/artplayer-plugin-ads.js"></script>
    -->
<script>
document.addEventListener("DOMContentLoaded", (event) => {
    window.player = new Artplayer({
        container: '#container',
        url: url,
        poster: pic,
        autoplay: true,
        autoSize: false,
        loop: false,
        mutex: true,
        setting: true,
        pip: true,
        flip: false,
        lock: true,
        fastForward: true,
        playbackRate: true,
        aspectRatio: true,
        theme: '#ff0057',
        fullscreen: true,
        fullscreenWeb: false,
        miniProgressBar: true,
        autoOrientation: true,
        airplay: false,
        whitelist: ['*'],
        customType: {
            m3u8: function (video, url) {
                if (Hls.isSupported()) {
                    if (window.player.hls) window.player.hls.destroy();
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    window.player.hls = hls;
                    window.player.on('destroy', () => hls.destroy());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                } else {
                    window.player.notice.show = 'Unsupported playback format: m3u8';
                }
            },
        },
          plugins: [
                      ],
    });
    window.video_hash = resumeKey;
    if(window.video_hash == '') window.video_hash = location.href.split('/').slice(-2).shift();
    window.player.on('video:progress', (event) => {
        if (!window.player.currentTime) { return }
        localStorage.setItem(window.video_hash, window.player.currentTime)
    })
    window.player.on('ready', () => {
        // window.player.contextmenu.remove('version')
        var progress = parseFloat(localStorage.getItem(window.video_hash))
        if (isNaN(progress)) {
            progress = 0
        }
        window.player.seek = progress
    })
});
</script>
</body>
</html>
